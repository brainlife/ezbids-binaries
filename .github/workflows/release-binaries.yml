# Build binaries for each library on Linux, macOS, and Windows,
# then publish them to a GitHub release.
# Trigger: push a version tag (e.g. v1.0.0).

name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.library }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        library:
          - dcm2niix
          - 7z
          - python-runtime
          - allineate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install allineate build deps (Linux)
        if: matrix.library == 'allineate' && matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libomp-dev zlib1g-dev

      - name: Install allineate build deps (macOS)
        if: matrix.library == 'allineate' && matrix.os == 'macos-latest'
        run: brew install libomp

      - name: Set up MSYS2 (allineate, Windows)
        if: matrix.library == 'allineate' && matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: git mingw-w64-x86_64-gcc mingw-w64-x86_64-zlib

      - name: Build binary (allineate, Windows / MSYS2)
        id: build_aw
        if: matrix.library == 'allineate' && matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p dist
          ./scripts/build.sh allineate windows-latest dist
          echo "binary_path=dist" >> "$GITHUB_OUTPUT"

      - name: Build binary
        id: build_std
        if: "!(matrix.library == 'allineate' && matrix.os == 'windows-latest')"
        shell: bash
        run: |
          mkdir -p dist
          ./scripts/build.sh "${{ matrix.library }}" "${{ matrix.os }}" dist
          BINARY_PATH=$(./scripts/output-path.sh "${{ matrix.library }}" "${{ matrix.os }}" dist)
          if [[ "${{ matrix.library }}" == "7z" && "${{ matrix.os }}" == "windows-latest" ]]; then
            BINARY_PATH="dist"
          fi
          echo "binary_path=$BINARY_PATH" >> "$GITHUB_OUTPUT"

      - name: Select artifact path
        id: build
        shell: bash
        env:
          AW_OUT: ${{ steps.build_aw.outputs.binary_path }}
          STD_OUT: ${{ steps.build_std.outputs.binary_path }}
          AW_OC: ${{ steps.build_aw.outcome }}
        run: |
          if [[ "$AW_OC" == "success" ]]; then
            echo "binary_path=$AW_OUT" >> "$GITHUB_OUTPUT"
          else
            echo "binary_path=$STD_OUT" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.library }}-${{ matrix.os }}
          path: ${{ steps.build.outputs.binary_path }}
          retention-days: 1

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets (flat names)
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
