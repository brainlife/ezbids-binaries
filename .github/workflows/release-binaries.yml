# Build binaries for each library on Linux, macOS, and Windows,
# then publish them to a GitHub release.
# Trigger: push a version tag (e.g. v1.0.0).

name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.library }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        library:
          - dcm2niix
          - 7z
          - python-runtime
          - allineate
        exclude:
          # Windows .exe is built via Ubuntu MinGW cross-compile (see build-allineate-windows).
          - os: windows-latest
            library: allineate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install allineate build deps (Linux)
        if: matrix.library == 'allineate' && matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libomp-dev zlib1g-dev

      - name: Install allineate build deps (macOS)
        if: matrix.library == 'allineate' && matrix.os == 'macos-latest'
        run: brew install libomp

      - name: Build binary
        id: build
        shell: bash
        run: |
          mkdir -p dist
          ./scripts/build.sh "${{ matrix.library }}" "${{ matrix.os }}" dist
          BINARY_PATH=$(./scripts/output-path.sh "${{ matrix.library }}" "${{ matrix.os }}" dist)
          if [[ "${{ matrix.library }}" == "7z" && "${{ matrix.os }}" == "windows-latest" ]]; then
            BINARY_PATH="dist"
          fi
          echo "binary_path=$BINARY_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.library }}-${{ matrix.os }}
          path: ${{ steps.build.outputs.binary_path }}
          retention-days: 1

  build-allineate-windows:
    name: Build allineate (windows-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW and zlib (cross-compile)
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 libz-mingw-w64-dev

      - name: Build Windows binary
        id: build
        shell: bash
        run: |
          mkdir -p dist
          export LIBRARY=allineate DIST=dist ALLINEATE_WINDOWS_CROSS=1
          bash scripts/build/allineate.sh
          echo "binary_path=$(./scripts/output-path.sh allineate windows-latest dist)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: allineate-windows-latest
          path: ${{ steps.build.outputs.binary_path }}
          retention-days: 1

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build, build-allineate-windows]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets (flat names)
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
