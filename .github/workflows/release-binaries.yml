# Build binaries for each library on Linux, macOS, and Windows,
# then publish them to a GitHub release.
# Trigger: push a version tag (e.g. v1.0.0).

name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.library }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        library:
          - dcm2niix
          - 7z
          - python-runtime
          - allineate
        exclude:
          # Allineate is excluded from the Windows matrix row: compiling it on windows-latest was
          # fragile (MinGW/MSYS, linking, POSIX helpers like drand48). Cross-compiling the same
          # .exe from ubuntu-latest with gcc-mingw-w64 is reliable; see job build-allineate-windows.
          - os: windows-latest
            library: allineate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install allineate build dependencies
        shell: bash
        run: ./scripts/build-deps/allineate.sh "${{ matrix.library }}" "${{ matrix.os }}"

      - name: Build binary
        id: build
        shell: bash
        run: |
          mkdir -p dist
          ./scripts/build.sh "${{ matrix.library }}" "${{ matrix.os }}" dist
          BINARY_PATH=$(./scripts/output-path.sh "${{ matrix.library }}" "${{ matrix.os }}" dist)
          if [[ "${{ matrix.library }}" == "7z" && "${{ matrix.os }}" == "windows-latest" ]]; then
            BINARY_PATH="dist"
          fi
          echo "binary_path=$BINARY_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.library }}-${{ matrix.os }}
          path: ${{ steps.build.outputs.binary_path }}
          retention-days: 1

  # Windows-target binary only: runs on Linux so we use Ubuntu's packaged MinGW cross toolchain
  # instead of a native windows-latest build (painful in CI for this C project).
  build-allineate-windows:
    name: Build allineate (windows-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install allineate build dependencies
        run: ./scripts/build-deps/allineate.sh allineate windows-cross

      - name: Build Windows binary
        id: build
        shell: bash
        run: |
          mkdir -p dist
          export LIBRARY=allineate DIST=dist ALLINEATE_WINDOWS_CROSS=1
          bash scripts/build/allineate.sh
          echo "binary_path=$(./scripts/output-path.sh allineate windows-latest dist)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: allineate-windows-latest
          path: ${{ steps.build.outputs.binary_path }}
          retention-days: 1

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build, build-allineate-windows]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets (flat names)
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
