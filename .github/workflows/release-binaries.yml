# Build binaries for each library on Linux, macOS, and Windows,
# then publish them to a GitHub release.
# Trigger: push a version tag (e.g. v1.0.0).

name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.library }} (${{ matrix.os }})
    # Allineate + windows-latest runs on ubuntu-latest: Windows .exe is always MinGW cross-built on Linux.
    runs-on: ${{ matrix.library == 'allineate' && matrix.os == 'windows-latest' && 'ubuntu-latest' || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        library:
          - dcm2niix
          - 7z
          - python-runtime
          - allineate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install allineate build dependencies
        shell: bash
        run: ./scripts/build-deps/allineate.sh "${{ matrix.library }}" "${{ matrix.os }}"

      - name: Build binary
        id: build
        shell: bash
        run: |
          mkdir -p dist
          ./scripts/build.sh "${{ matrix.library }}" "${{ matrix.os }}" dist
          BINARY_PATH=$(./scripts/output-path.sh "${{ matrix.library }}" "${{ matrix.os }}" dist)
          if [[ "${{ matrix.library }}" == "7z" && "${{ matrix.os }}" == "windows-latest" ]]; then
            BINARY_PATH="dist"
          fi
          echo "binary_path=$BINARY_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.library }}-${{ matrix.os }}
          path: ${{ steps.build.outputs.binary_path }}
          retention-days: 1

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets (flat names)
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
